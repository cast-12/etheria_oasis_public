<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etheria GW — Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
  :root {
    --bg:          #09071A;
    --surface:     #110D27;
    --card:        #17122E;
    --card-hover:  #1D1738;
    --border:      #2A2050;
    --border-hi:   #3D3070;
    --purple:      #7C3AED;
    --purple-hi:   #9D65F5;
    --purple-pale: #A78BFA;
    --purple-dim:  #4C1D95;
    --purple-glow: rgba(124,58,237,0.18);
    --purple-glow2:rgba(124,58,237,0.08);
    --text:        #EDE9FE;
    --text-2:      #A89FCC;
    --text-3:      #5C5480;
    --green:       #10B981;
    --green-dim:   #064E3B;
    --red:         #EF4444;
    --red-dim:     #450A0A;
    --r:           8px;
    --r-lg:        14px;
    --r-xl:        20px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ─────────────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 200;
    background: rgba(9,7,26,0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 16px;
    color: var(--purple-pale);
    display: flex; align-items: center; gap: 10px;
    letter-spacing: -0.01em;
  }

  .logo-hex {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--purple-dim), var(--purple));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .nav-tabs { display: flex; gap: 2px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }

  .tab-btn {
    background: none; border: none;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
    color: var(--text-3); padding: 6px 16px; border-radius: 7px;
    cursor: pointer; transition: all 0.18s; white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text-2); background: var(--card); }
  .tab-btn.active { background: var(--purple); color: #fff; }

  .conn-pill {
    display: flex; align-items: center; gap: 7px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 12px;
    font-size: 12px; color: var(--text-3);
  }
  .conn-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-3); transition: background 0.3s;
    flex-shrink: 0;
  }
  .conn-dot.on  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .conn-dot.err { background: var(--red); }

  /* ── Main layout ─────────────────────────────────────── */
  main { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }

  .section { display: none; }
  #section-planner.active { display: flex; flex-direction: column; align-items: center; }
  .section.active { display: block; }

  /* ── Setup banner ────────────────────────────────────── */
  .setup-banner {
    border: 1px solid var(--border-hi);
    background: linear-gradient(135deg, var(--surface) 0%, rgba(76,29,149,0.15) 100%);
    border-radius: var(--r-xl);
    padding: 1.5rem 1.75rem;
    margin-bottom: 2rem;
  }
  .setup-banner h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px; font-weight: 600;
    color: var(--purple-pale); margin-bottom: 0.6rem;
    display: flex; align-items: center; gap: 8px;
  }
  .setup-banner p, .setup-banner ol { font-size: 13px; color: var(--text-2); line-height: 1.8; margin-bottom: 1rem; }
  .setup-banner ol { padding-left: 1.25rem; }
  .setup-banner ol li { margin-bottom: 3px; }
  .setup-banner code { background: var(--border); color: var(--purple-pale); padding: 1px 6px; border-radius: 4px; font-size: 12px; font-family: monospace; }
  .setup-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .setup-note { font-size: 12px !important; color: var(--text-3) !important; margin-bottom: 0 !important; margin-top: 10px; }

  /* ── Page header ─────────────────────────────────────── */
  .page-eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--purple); margin-bottom: 6px;
  }
  .page-heading {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px; font-weight: 700; letter-spacing: -0.03em;
    color: var(--text); margin-bottom: 6px; line-height: 1.2;
  }
  .page-sub { font-size: 14px; color: var(--text-2); margin-bottom: 2rem; }

  /* ── Cards ───────────────────────────────────────────── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 1.5rem;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
    position: relative;
  }

  .card-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-3); margin-bottom: 1.25rem;
  }

  /* Arcane glow on the main lookup card */
  .card-glow::before {
    content: '';
    position: absolute; inset: -1px; border-radius: var(--r-lg);
    background: linear-gradient(135deg, var(--purple-dim), transparent 60%);
    z-index: -1; opacity: 0.5;
    pointer-events: none;
  }
  .card-glow {
    border-color: #3D2A6A;
    background: linear-gradient(160deg, #1C1540 0%, var(--card) 60%);
  }

  /* ── Form elements ───────────────────────────────────── */
  .input-label {
    display: block; font-size: 11px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-3); margin-bottom: 6px;
  }

  input[type="text"], textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 14px;
    padding: 10px 14px;
    border-radius: var(--r);
    width: 100%;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
  }
  input[type="text"]:focus, textarea:focus {
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
  }
  input[type="text"]::placeholder, textarea::placeholder { color: var(--text-3); }
  textarea { resize: vertical; min-height: 76px; }

  .unit-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.25rem; }

  /* ── Buttons ─────────────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 20px; border-radius: var(--r);
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; border: none; transition: all 0.16s; white-space: nowrap;
  }
  .btn-full { width: 100%; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .btn-primary {
    background: var(--purple);
    color: #fff;
    box-shadow: 0 4px 14px rgba(124,58,237,0.35);
  }
  .btn-primary:not(:disabled):hover {
    background: var(--purple-hi);
    box-shadow: 0 4px 20px rgba(124,58,237,0.55);
    transform: translateY(-1px);
  }
  .btn-primary:not(:disabled):active { transform: translateY(0); }

  .btn-ghost {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-2);
  }
  .btn-ghost:not(:disabled):hover {
    border-color: var(--border-hi); color: var(--text);
    background: var(--card);
  }

  .btn-danger {
    background: none;
    border: 1px solid rgba(239,68,68,0.3);
    color: #F87171;
  }
  .btn-danger:not(:disabled):hover {
    background: var(--red-dim);
    border-color: var(--red);
  }

  /* ── Dividers ────────────────────────────────────────── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-3);
    margin-bottom: 10px;
  }

  /* ── Result states ───────────────────────────────────── */
  #result-area { margin-top: 1.25rem; }

  .result-found {
    background: linear-gradient(135deg, rgba(16,185,129,0.07) 0%, var(--card) 70%);
    border: 1px solid rgba(16,185,129,0.25);
    border-radius: var(--r-lg); padding: 1.25rem 1.5rem;
  }
  .result-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(16,185,129,0.12); color: var(--green);
    border-radius: 20px; padding: 3px 12px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  .result-team-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
    color: var(--text); margin-bottom: 0.75rem;
  }
  .result-units { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .unit-pill {
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.3);
    color: var(--purple-pale);
    border-radius: 20px; padding: 5px 14px;
    font-size: 13px; font-weight: 500;
  }
  .result-note {
    font-size: 13px; color: var(--text-2);
    border-top: 1px solid var(--border);
    padding-top: 0.75rem; white-space: pre-wrap; line-height: 1.7;
  }
  .result-multi { display: flex; flex-direction: column; gap: 12px; }

  .result-empty {
    background: var(--surface);
    border: 1px dashed var(--border-hi);
    border-radius: var(--r-lg); padding: 2rem 1.5rem;
    text-align: center;
  }
  .result-empty strong { display: block; font-family: 'Space Grotesk', sans-serif; font-size: 16px; color: var(--text); margin-bottom: 6px; }
  .result-empty p { font-size: 13px; color: var(--text-2); }
  .suggest-btn {
    display: inline-flex; align-items: center; gap: 7px;
    margin-top: 1rem; background: rgba(124,58,237,0.1);
    border: 1px solid rgba(124,58,237,0.3); color: var(--purple-pale);
    border-radius: var(--r); padding: 8px 18px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: all 0.15s;
  }
  .suggest-btn:hover { background: rgba(124,58,237,0.2); border-color: var(--purple); }

  /* ── Data manager ────────────────────────────────────── */
  .two-col { display: grid; grid-template-columns: 340px 1fr; gap: 1.25rem; align-items: start; }

  .entry-list { display: flex; flex-direction: column; gap: 6px; max-height: 540px; overflow-y: auto; padding-right: 2px; }
  .entry-list::-webkit-scrollbar { width: 4px; }
  .entry-list::-webkit-scrollbar-track { background: transparent; }
  .entry-list::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 4px; }

  .entry-row {
    display: flex; align-items: center; gap: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 9px 12px;
    transition: border-color 0.15s;
  }
  .entry-row:hover { border-color: var(--border-hi); }
  .entry-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; overflow: hidden; }
  .entry-enemy { font-size: 11px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-counter { font-size: 13px; color: var(--purple-pale); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-actions {
    display: flex; gap: 2px; flex-shrink: 0; margin-left: 10px; align-items: center;
  }
  .entry-del {
    background: none; border: none; color: var(--text-3);
    cursor: pointer; font-size: 15px; line-height: 1; padding: 4px 5px;
    flex-shrink: 0; border-radius: 4px; transition: all 0.12s;
  }
  .entry-del:hover { color: #F87171; background: var(--red-dim); }

  .entry-edit {
    background: none; border: none; color: var(--text-3);
    cursor: pointer; font-size: 13px; line-height: 1; padding: 4px 5px;
    flex-shrink: 0; border-radius: 4px; transition: all 0.12s;
  }
  .entry-edit:hover { color: var(--purple-pale); background: rgba(124,58,237,0.15); }

  /* Edit modal */
  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    z-index: 500; align-items: center; justify-content: center;
    padding: 1rem;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--card); border: 1px solid var(--border-hi);
    border-radius: var(--r-xl); padding: 1.5rem;
    width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .modal-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px; font-weight: 600; color: var(--text);
  }
  .modal-close {
    background: none; border: none; color: var(--text-3);
    font-size: 20px; cursor: pointer; border-radius: 4px;
    padding: 2px 6px; transition: all 0.12s; line-height: 1;
  }
  .modal-close:hover { color: var(--text); background: var(--border); }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 1rem; }

  .empty-state { text-align: center; color: var(--text-3); font-size: 13px; padding: 2.5rem 1rem; }

  .count-chip {
    display: inline-block; background: rgba(124,58,237,0.15);
    color: var(--purple-pale); font-size: 11px; font-weight: 600;
    padding: 2px 10px; border-radius: 20px; margin-left: 8px; vertical-align: middle;
  }

  .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .io-row { display: flex; gap: 8px; margin-top: 1rem; }

  /* ── Toast ───────────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 1.75rem; left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: var(--card); border: 1px solid var(--border-hi);
    border-radius: var(--r); padding: 10px 22px;
    font-size: 14px; color: var(--text);
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 9999; white-space: nowrap; pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok  { border-color: rgba(16,185,129,0.4); color: #6EE7B7; }
  .toast.err { border-color: rgba(239,68,68,0.4); color: #FCA5A5; }

  /* ── Spinner ─────────────────────────────────────────── */
  .spin {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.65s linear infinite;
    vertical-align: -2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Form spacing ────────────────────────────────────── */
  .field { margin-bottom: 12px; }

  /* ── Responsive ──────────────────────────────────────── */
  @media (max-width: 700px) {
    .two-col { grid-template-columns: 1fr; }
    .unit-grid { grid-template-columns: 1fr; }
    header { padding: 0 1rem; }
    main { padding: 1.5rem 1rem 4rem; }
    .nav-tabs { display: none; }
    .setup-fields { grid-template-columns: 1fr; }
    .io-row { flex-direction: column; }
  }
  /* ── Player Stats page ───────────────────────────────── */
  .stats-toolbar {
    display: flex; gap: 10px; align-items: center;
    flex-wrap: wrap; margin-bottom: 1.5rem;
  }
  .stats-toolbar input[type=text] { max-width: 220px; }
  .toggle-group { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 3px; gap: 2px; }
  .toggle-btn { background: none; border: none; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-3); padding: 5px 14px; border-radius: 6px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .toggle-btn:hover { color: var(--text-2); }
  .toggle-btn.active { background: var(--purple); color: #fff; }
  .stats-table-wrap { overflow-x: auto; border-radius: var(--r-lg); border: 1px solid var(--border); }
  .stats-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .stats-table th { background: var(--surface); color: var(--text-3); font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); cursor: pointer; white-space: nowrap; user-select: none; }
  .stats-table th:hover { color: var(--purple-pale); }
  .stats-table th .sort-icon { margin-left: 4px; opacity: 0.4; font-size: 10px; }
  .stats-table th.sorted { color: var(--purple-pale); }
  .stats-table th.sorted .sort-icon { opacity: 1; }
  .stats-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
  .stats-table tr:last-child td { border-bottom: none; }
  .stats-table tr:hover td { background: var(--card-hover); }
  .stats-table td:first-child { font-weight: 500; color: var(--text); }
  .wr-bar-wrap { display: flex; align-items: center; gap: 8px; min-width: 130px; }
  .wr-bar-bg { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .wr-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .wr-good  { background: #10B981; }
  .wr-mid   { background: #F59E0B; }
  .wr-bad   { background: #EF4444; }
  .wr-val   { font-size: 12px; font-weight: 600; min-width: 36px; text-align: right; }
  .stat-num { font-variant-numeric: tabular-nums; }
  .upload-zone {
    border: 2px dashed var(--border-hi); border-radius: var(--r-xl);
    padding: 3rem 2rem; text-align: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 1.5rem;
  }
  .upload-zone:hover { border-color: var(--purple); background: rgba(124,58,237,0.05); }
  .upload-zone p { color: var(--text-2); font-size: 14px; margin-top: 0.5rem; }
  .upload-zone strong { color: var(--text); font-size: 15px; }
  .upload-icon { font-size: 2rem; margin-bottom: 0.5rem; }
  .war-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }
  .war-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--text-2);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .war-chip:hover { border-color: var(--border-hi); color: var(--text); }
  .war-chip.active { background: rgba(124,58,237,0.15); border-color: var(--purple); color: var(--purple-pale); }
  .war-chip.all-chip { font-weight: 600; }
  .arch-btn:hover { color: var(--purple-pale) !important; background: rgba(124,58,237,0.15) !important; }
  .war-chip-wrap { gap: 0; }
  .stats-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 1rem 1.25rem; }
  .stat-card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); margin-bottom: 4px; }
  .stat-card-val { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-card-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  @media (max-width: 640px) { .stats-summary { grid-template-columns: 1fr 1fr; } .stats-toolbar { flex-direction: column; align-items: stretch; } }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="brand">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><polygon points="9,1 17,17 1,17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      </div>
      <span class="brand-name">Etheria GW</span>
    </div>
    <nav class="nav-tabs">
      <button class="tab-btn active" id="tab-stats"  onclick="showSection('stats')">Player Stats</button>
      <button class="tab-btn"        id="tab-roster" onclick="showSection('roster')">Roster</button>
    </nav>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <span class="conn-dot" id="conn-dot"></span>
    <span id="conn-text" style="font-size:13px;color:var(--text-2)">Connecting…</span>
  </div>
</header>

<main>
  <!-- PLAYER STATS -->
  <div id="section-stats" class="section active">
    <p class="page-eyebrow">Guild War on Etheria Restart</p>
    <h1 class="page-heading">Player Stats</h1>

window.initStatsListener = function(db, fns) {

// ── War chips ────────────────────────────────────────
// Store war list globally so toggleStatWar can look up by index
let _warList = [];       // active wars in display order
let _archiveList = [];  // archived wars

// Determine if a war name is S3/S4 (current season)
function isCurrentSeason(w) {
  return /^s[34]\s+war/i.test(w.trim());
}

// Sort wars: S4 first (newest), then S3 descending, then others alphabetically
function sortWars(wars) {
  // Extract season number from names like "S3 War 1", "S4 War 2", "S5 War 1" etc.
  function seasonNum(w) {
    const m = w.match(/^s(\d+)/i);
    return m ? parseInt(m[1]) : 0;
  }
  function warNum(w) {
    const m = w.match(/war\s+(\d+)/i);
    return m ? parseInt(m[1]) : 0;
  }
  return [...wars].sort((a, b) => {
    const aSeason = seasonNum(a), bSeason = seasonNum(b);
    // Season wars (S3, S4, S5...) always before non-season wars
    if (aSeason && !bSeason) return -1;
    if (!aSeason && bSeason) return 1;
    // Higher season number first
    if (aSeason !== bSeason) return bSeason - aSeason;
    // Same season — higher war number first
    const aWar = warNum(a), bWar = warNum(b);
    if (aWar !== bWar) return bWar - aWar;
    return a.localeCompare(b);
  });
}

window.rebuildWarChips = function rebuildWarChips() {
  const allWars = [...new Set(statsEntries.map(e => (e.war||'').trim()).filter(Boolean))];
  const archived = new Set(Object.keys(warsMeta).filter(k => warsMeta[k] && warsMeta[k].archived));

  _warList    = sortWars(allWars.filter(w => !archived.has(w)));
  _archiveList = sortWars(allWars.filter(w => archived.has(w)));
  const combined = [..._warList, ..._archiveList];

  const chips = document.getElementById('stats-war-chips');
  if (!combined.length) { chips.innerHTML = ''; return; }

  // Prune activeStatsWars
  if (!activeStatsWars.has('__all__')) {
    activeStatsWars.forEach(w => { if (!combined.includes(w)) activeStatsWars.delete(w); });
    if (!activeStatsWars.size) activeStatsWars.add('__all__');
  }

  function chipHTML(w, i) {
    const isActive = activeStatsWars.has(w);
    const isArch   = archived.has(w);
    const enc      = encodeURIComponent(w);
    return `<span style="display:inline-flex;align-items:center" class="war-chip-wrap">
      <button class="war-chip${isActive?' active':''}" onclick="toggleStatWar(${i})" style="border-radius:20px 0 0 20px;border-right:none">${w}</button>
      <button onclick="openEditWarModal(decodeURIComponent('${enc}'))" title="Edit / delete war"
        style="background:var(--surface);border:1px solid var(--border);border-left:none;border-right:none;cursor:pointer;color:var(--text-3);font-size:11px;padding:4px 5px;line-height:1"
        class="arch-btn">✎</button>
      <button onclick="${isArch?'unarchiveWar':'archiveWar'}(decodeURIComponent('${enc}'))" title="${isArch?'Restore':'Archive'}"
        style="background:var(--surface);border:1px solid var(--border);border-left:none;cursor:pointer;color:var(--text-3);font-size:11px;padding:4px 5px;border-radius:0 20px 20px 0;line-height:1"
        class="arch-btn">${isArch?'↑':'↓'}</button>
    </span>`;
  }

  let html = `<button class="war-chip all-chip${activeStatsWars.has('__all__')?' active':''}" onclick="toggleStatWar(-1)">All Wars</button>`;

  // Active wars
  _warList.forEach((w,i) => { html += chipHTML(w, i); });

  // Archive section
  if (_archiveList.length) {
    html += `<br><span style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-3);margin:8px 4px 4px;display:inline-block">Archive</span>`;
    _archiveList.forEach((w, i) => { html += chipHTML(w, _warList.length + i); });
  }

  chips.innerHTML = html;
}

window.toggleStatWar = idx => {
  if (idx === -1) {
    activeStatsWars = new Set(['__all__']);
  } else {
    const name = _warList[idx];
    if (!name) return;
    activeStatsWars.delete('__all__');
    if (activeStatsWars.has(name)) {
      activeStatsWars.delete(name);
      if (!activeStatsWars.size) activeStatsWars.add('__all__');
    } else {
      activeStatsWars.add(name);
    }
  }
  rebuildWarChips();
  renderStats();
};

window.saveEditWar = async () => {
  if (!window.fsDb) return;
  const originalName = document.getElementById('ew-original-name').value.trim();
  const newName      = document.getElementById('ew-war-name').value.trim();
  if (!newName) { window.toast('War name cannot be empty.','err'); return; }

  const { collection, addDoc, getDocs, query, where, doc, setDoc, deleteDoc, writeBatch } = window.__fsFns;
  const btn = document.getElementById('ew-save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';

  try {
    // Delete all existing entries for this war
    const snap = await getDocs(query(collection(window.fsDb,'playerstats'), where('war','==',originalName)));
    const batch = writeBatch(window.fsDb);
    snap.docs.forEach(d => batch.delete(d.ref));
    await batch.commit();

    // Save new rows from the form
    let saved = 0;
    for (const row of document.querySelectorAll('#ew-atk-rows > div, #ew-def-rows > div')) {
      const type    = row.dataset.type;
      const inputs  = row.querySelectorAll('input');
      const player  = inputs[0].value.trim();
      const wins    = parseFloat(inputs[1].value) || 0;
      const losses  = parseFloat(inputs[2].value) || 0;
      if (!player || (wins + losses) === 0) continue;
      await addDoc(collection(window.fsDb,'playerstats'), {
        player, war: newName,
        aWins: type==='atk'?wins:0, aLoss: type==='atk'?losses:0,
        dWins: type==='def'?wins:0, dLoss: type==='def'?losses:0,
        added: Date.now()
      });
      saved++;
    }

    // If renamed, update wars meta too
    if (newName !== originalName) {
      const oldId = originalName.replace(/[^a-zA-Z0-9_-]/g,'_').slice(0,100);
      const newId = newName.replace(/[^a-zA-Z0-9_-]/g,'_').slice(0,100);
      try {
        await setDoc(doc(window.fsDb,'wars',newId), { name: newName, archived: false });
        await deleteDoc(doc(window.fsDb,'wars',oldId));
      } catch(e) {}
    }

    closeEditWarModal();
    window.toast(`Saved ${saved} entries for "${newName}".`, 'ok');
  } catch(e) {
    window.toast('Save failed: '+e.message,'err');
  } finally { btn.disabled=false; btn.textContent='Save Changes'; }
};

// ── Aggregate entries into per-player totals ─────────
// ── Player alias / merge map ─────────────────────────
// All variants map to one canonical display name
const PLAYER_MERGE = {
  'dev':      'Devocate',
  'devocate': 'Devocate',
  'castiji':  'Iji',
  'castlij':  'Iji',
  'iji':      'Iji',
  'puck':     'Tristan',
  'tristan':  'Tristan',
};
function mergePlayer(name) {
  const k = (name||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  return PLAYER_MERGE[k] || name;
}
window.mergePlayer = mergePlayer;

function aggregateStats() {
  const map = {};
  const filtered = activeStatsWars.has('__all__')
    ? statsEntries
    : statsEntries.filter(e => activeStatsWars.has((e.war||'').trim()));
  filtered.forEach(e => {
    const merged = mergePlayer(e.player||'');
    const k = merged.toLowerCase();
    if (!k) return;
    if (!map[k]) map[k] = { name: merged, aWins:0, aLoss:0, dWins:0, dLoss:0, entries:[] };
    map[k].aWins += (e.aWins||0);
    map[k].aLoss += (e.aLoss||0);
    map[k].dWins += (e.dWins||0);
    map[k].dLoss += (e.dLoss||0);
    map[k].entries.push(e);
  });
  return Object.values(map).map(p => {
    const aHits = p.aWins + p.aLoss;
    const dHits = p.dWins + p.dLoss;
    return {
      ...p,
      aHits, dHits,
      totHits: aHits + dHits,
      aWR: aHits > 0 ? p.aWins / aHits : null,
      dWR: dHits > 0 ? p.dWins / dHits : null,
      totWR: (aHits+dHits) > 0 ? (p.aWins+p.dWins) / (aHits+dHits) : null,
    };
  });
}

// ── Helpers ──────────────────────────────────────────
function wrColor(wr) { if(wr===null)return'var(--text-3)'; return wr>=0.65?'#10B981':wr>=0.4?'#F59E0B':'#EF4444'; }
function wrCls(wr)   { if(wr===null)return''; return wr>=0.65?'wr-good':wr>=0.4?'wr-mid':'wr-bad'; }
function fmtWR(wr)   { return wr===null?'—':Math.round(wr*100)+'%'; }
function wrBar(wr) {
  if(wr===null) return '<span style="color:var(--text-3);font-size:12px">—</span>';
  const pct = Math.round(wr*100);
  return `<div class="wr-bar-wrap"><div class="wr-bar-bg"><div class="wr-bar-fill ${wrCls(wr)}" style="width:${pct}%"></div></div><span class="wr-val" style="color:${wrColor(wr)}">${pct}%</span></div>`;
}

  document.getElementById('mode-'+mode).classList.add('active');

};
window.sortByCol = col => {
  if (statsColSort && statsColSort.col === col) {
    // toggle direction
    statsColSort.dir = statsColSort.dir === 'desc' ? 'asc' : 'desc';
  } else {
    statsColSort = { col, dir: 'desc' };
  }
  renderStats();
};

window.setStatsSort = s => {
  statsSort = s;
  document.querySelectorAll('.toggle-btn[id^="sort-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-'+s).classList.add('active');
  renderStats();
};

// ── Render ───────────────────────────────────────────
window.renderStats = () => {
  let players = aggregateStats();
  const q = (document.getElementById('stats-search')||{value:''}).value.trim().toLowerCase();
  if (q) players = players.filter(p => p.name.toLowerCase().includes(q));

  players.sort((a,b) => {
    // Column header sort takes priority
    if (statsColSort) {
      const { col, dir } = statsColSort;
      const mult = dir === 'desc' ? 1 : -1;
      const av = a[col], bv = b[col];
      if (col === 'name') return mult * a.name.localeCompare(b.name);
      if (av === null && bv === null) return 0;
      if (av === null) return 1;
      if (bv === null) return -1;
      return mult * (bv - av);
    }
    // Toolbar sort fallback
    if (statsSort==='name') return a.name.localeCompare(b.name);
    if (statsSort==='hits') {
      const ha = statsMode==='defense'?a.dHits:statsMode==='attack'?a.aHits:a.totHits;
      const hb = statsMode==='defense'?b.dHits:statsMode==='attack'?b.aHits:b.totHits;
      return hb-ha;
    }
    const wa = statsMode==='defense'?a.dWR:statsMode==='attack'?a.aWR:a.totWR;
    const wb = statsMode==='defense'?b.dWR:statsMode==='attack'?b.aWR:b.totWR;
    if(wa===null&&wb===null)return 0; if(wa===null)return 1; if(wb===null)return -1;
    return wb-wa;
  });

  // Summary
  const avgAWR = players.filter(p=>p.aWR!==null);
  const avgDWR = players.filter(p=>p.dWR!==null);
  const aAvg = avgAWR.length ? avgAWR.reduce((s,p)=>s+p.aWR,0)/avgAWR.length : null;
  const dAvg = avgDWR.length ? avgDWR.reduce((s,p)=>s+p.dWR,0)/avgDWR.length : null;
  const totalHits = players.reduce((s,p)=>s+p.totHits,0);
  document.getElementById('stats-summary').innerHTML = `
    <div class="stat-card"><div class="stat-card-label">Players</div><div class="stat-card-val">${players.length}</div><div class="stat-card-sub">tracked</div></div>
    <div class="stat-card"><div class="stat-card-label">Avg Off WR</div><div class="stat-card-val" style="color:${wrColor(aAvg)}">${fmtWR(aAvg)}</div><div class="stat-card-sub">guild average</div></div>
    <div class="stat-card"><div class="stat-card-label">Avg Def WR</div><div class="stat-card-val" style="color:${wrColor(dAvg)}">${fmtWR(dAvg)}</div><div class="stat-card-sub">guild average</div></div>
    <div class="stat-card"><div class="stat-card-label">Total Hits</div><div class="stat-card-val">${totalHits}</div><div class="stat-card-sub">offense + defense</div></div>`;

  // Table headers
  const showA = statsMode==='both'||statsMode==='attack';
  const showD = statsMode==='both'||statsMode==='defense';
  const sc = statsColSort;
  function th(label, col) {
    const active = sc && sc.col === col;
    const arrow  = active ? (sc.dir === 'desc' ? ' ↓' : ' ↑') : '';
    return `<th onclick="sortByCol('${col}')" style="cursor:pointer;user-select:none${active?';color:var(--purple-pale)':''}">${label}${arrow}</th>`;
  }
  document.getElementById('stats-thead').innerHTML = `<tr>
    ${th('Player','name')}
    ${showA?`${th('Off W','aWins')}${th('Off L','aLoss')}${th('Off Hits','aHits')}${th('Off WR','aWR')}`:''}
    ${showD?`${th('Def W','dWins')}${th('Def L','dLoss')}${th('Def Hits','dHits')}${th('Def WR','dWR')}`:''}
    ${statsMode==='both'?`${th('Total','totHits')}${th('Overall WR','totWR')}`:''}
  </tr>`;

  // Table rows
  document.getElementById('stats-tbody').innerHTML = players.length
    ? players.map(p => `<tr>
        <td style="font-weight:500">${esc(p.name)}</td>
        ${showA?`<td>${p.aWins}</td><td>${p.aLoss}</td><td>${p.aHits}</td><td>${wrBar(p.aWR)}</td>`:''}
        ${showD?`<td>${p.dWins}</td><td>${p.dLoss}</td><td>${p.dHits}</td><td>${wrBar(p.dWR)}</td>`:''}
        ${statsMode==='both'?`<td>${p.totHits}</td><td>${wrBar(p.totWR)}</td>`:''}
        <td style="white-space:nowrap">
          <button class="entry-edit" onclick='openStatModal(${JSON.stringify(p.entries[0])})' title="Edit">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M9 2l2 2-7 7H2V9l7-7z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
          </button>
          <button class="entry-del" onclick="deleteStatEntry('${esc(p.entries[0].id)}')" title="Delete">✕</button>
        </td>
      </tr>`).join('')
    : `<tr><td colspan="12" style="text-align:center;color:var(--text-3);padding:2rem">No players yet. Click "+ Add / Edit Player" to get started.</td></tr>`;
};


// ── Import all wars from xlsx ────────────────────────
window.importStatsFromXlsx = event => {
  if (!window.fsDb) { window.toast('Not connected to Firebase yet.','err'); return; }
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const statusEl = document.getElementById('stats-import-status');
      statusEl.style.color = 'var(--text-2)';
      statusEl.textContent = 'Importing…';

      const { collection, addDoc } = window.__fsFns;
      let totalAdded = 0;

      for (const sheetName of wb.SheetNames) {
        const ws   = wb.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
        if (!rows.length) continue;

        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];

          // Attack: col1=member, col2=wins, col3=losses, col4=hits
          const aMember = (row[1]||'').toString().trim();
          const aWins   = parseFloat(row[2]) || 0;
          const aLoss   = parseFloat(row[3]) || 0;
          const aHits   = parseFloat(row[4]) || 0;
          if (aMember && aMember !== 'Total:' && aHits > 0) {
            const mergedA = window.mergePlayer ? window.mergePlayer(aMember) : aMember;
            await addDoc(collection(window.fsDb,'playerstats'), {
              player: mergedA, war: sheetName,
              aWins, aLoss, dWins: 0, dLoss: 0, added: Date.now()
            });
            totalAdded++;
          }

          // Defense: col9=member, col10=wins, col11=losses, col12=hits
          const dMember = (row[9]||'').toString().trim();
          const dWins   = parseFloat(row[10]) || 0;
          const dLoss   = parseFloat(row[11]) || 0;
          const dHits   = parseFloat(row[12]) || 0;
          if (dMember && dMember !== 'Total:' && dHits > 0) {
            const mergedD = window.mergePlayer ? window.mergePlayer(dMember) : dMember;
            await addDoc(collection(window.fsDb,'playerstats'), {
              player: mergedD, war: sheetName,
              aWins: 0, aLoss: 0, dWins, dLoss, added: Date.now()
            });
            totalAdded++;
          }
        }
      }

      statusEl.style.color = 'var(--success-light)';
      statusEl.textContent = `✓ Imported ${totalAdded} entries from ${wb.SheetNames.length} wars.`;
      window.toast(`Imported ${totalAdded} entries!`, 'ok');
      if (window.rebuildWarChips) rebuildWarChips();
    } catch(err) {
      window.toast('Import failed: ' + err.message, 'err');
      document.getElementById('stats-import-status').textContent = 'Import failed: ' + err.message;
    }
  };
  reader.readAsArrayBuffer(file);
  event.target.value = '';
};


// ── Add War modal ─────────────────────────────────────
const AW_SLOTS = 30;

function getRecentPlayers() {
  if (!statsEntries.length) return [];
  const wars = [...new Set(statsEntries.map(e => (e.war||'').trim()).filter(Boolean))];
  if (!wars.length) return [];
  // Prefer S3 War 8 Vs Dawn as the default template war
  const preferred = wars.find(w => /s3.war.8/i.test(w) && /dawn/i.test(w));
  const recent = preferred || sortWars(wars)[0];
  const players = [...new Set(
    statsEntries.filter(e => (e.war||'').trim() === recent).map(e => (e.player||'').trim()).filter(Boolean)
  )].sort();
  return players;
}

function makeAwRow(type, idx, name) {
  return `<div style="display:grid;grid-template-columns:1fr 52px 52px;gap:4px" id="aw-${type}-${idx}">
    <input type="text" value="${(name||'').replace(/"/g,'&quot;')}" placeholder="Player ${idx+1}"
      style="font-size:12px;padding:6px 8px" autocomplete="off" list="aw-player-list">
    <input type="number" placeholder="0" min="0"
      style="font-size:12px;padding:6px;text-align:center" autocomplete="off">
    <input type="number" placeholder="0" min="0"
      style="font-size:12px;padding:6px;text-align:center" autocomplete="off">
  </div>`;
}

// ── War Draft (persists in localStorage) ─────────────
const WAR_DRAFT_KEY = 'etheria_war_draft';

function saveWarDraft() {
  const draft = { warName: document.getElementById('aw-war-name').value };
  for (let i = 0; i < AW_SLOTS; i++) {
    const atkRow = document.getElementById(`aw-atk-${i}`);
    const defRow = document.getElementById(`aw-def-${i}`);
    if (atkRow) {
      const ins = atkRow.querySelectorAll('input');
      draft[`atk_${i}_name`]  = ins[0]?.value || '';
      draft[`atk_${i}_wins`]  = ins[1]?.value || '';
      draft[`atk_${i}_loss`]  = ins[2]?.value || '';
    }
    if (defRow) {
      const ins = defRow.querySelectorAll('input');
      draft[`def_${i}_name`]  = ins[0]?.value || '';
      draft[`def_${i}_wins`]  = ins[1]?.value || '';
      draft[`def_${i}_loss`]  = ins[2]?.value || '';
    }
  }
  try { localStorage.setItem(WAR_DRAFT_KEY, JSON.stringify(draft)); } catch(e) {}
}

function loadWarDraft() {
  try { return JSON.parse(localStorage.getItem(WAR_DRAFT_KEY) || 'null'); } catch(e) { return null; }
}

function clearWarDraft() {
  try { localStorage.removeItem(WAR_DRAFT_KEY); } catch(e) {}
}

window.openAddWarModal = () => {
  const draft = loadWarDraft();
  const players = getRecentPlayers();

  // Build datalist for autocomplete
  let dl = document.getElementById('aw-player-list');
  if (!dl) { dl = document.createElement('datalist'); dl.id = 'aw-player-list'; document.body.appendChild(dl); }
  const allPlayers = [...new Set(statsEntries.map(e => (e.player||'').trim()).filter(Boolean))].sort();
  dl.innerHTML = allPlayers.map(p => `<option value="${p.replace(/"/g,'&quot;')}">`).join('');

  // Fill rows — prefer draft, fall back to recent players
  const atkContainer = document.getElementById('aw-atk-rows');
  const defContainer = document.getElementById('aw-def-rows');
  atkContainer.innerHTML = '';
  defContainer.innerHTML = '';
  for (let i = 0; i < AW_SLOTS; i++) {
    const atkName = draft?.[`atk_${i}_name`] ?? players[i] ?? '';
    const defName = draft?.[`def_${i}_name`] ?? players[i] ?? '';
    atkContainer.innerHTML += makeAwRow('atk', i, atkName);
    defContainer.innerHTML += makeAwRow('def', i, defName);
  }

  // Restore war name and numeric fields from draft
  if (draft) {
    document.getElementById('aw-war-name').value = draft.warName || '';
    for (let i = 0; i < AW_SLOTS; i++) {
      const atkRow = document.getElementById(`aw-atk-${i}`);
      const defRow = document.getElementById(`aw-def-${i}`);
      if (atkRow && draft[`atk_${i}_wins`] !== undefined) {
        const ins = atkRow.querySelectorAll('input');
        ins[1].value = draft[`atk_${i}_wins`];
        ins[2].value = draft[`atk_${i}_loss`];
      }
      if (defRow && draft[`def_${i}_wins`] !== undefined) {
        const ins = defRow.querySelectorAll('input');
        ins[1].value = draft[`def_${i}_wins`];
        ins[2].value = draft[`def_${i}_loss`];
      }
    }
    window.toast('Draft restored — pick up where you left off!', 'ok');
  } else {
    document.getElementById('aw-war-name').value = '';
  }

  // Auto-save on any input change
  const modal =   modal.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', saveWarDraft);
  });
  // Also watch dynamically added rows
  modal.addEventListener('input', saveWarDraft);

    setTimeout(() => document.getElementById('aw-war-name').focus(), 60);
};

window.closeAddWarModal = () =>   if (e.target === e.currentTarget) closeAddWarModal();
});

window.saveAddWar = async () => {
  if (!window.fsDb) { window.toast('Not connected to Firebase.','err'); return; }
  const warName = document.getElementById('aw-war-name').value.trim();
  if (!warName) { window.toast('Enter a war name.','err'); return; }

  const { collection, addDoc } = window.__fsFns;
  const btn = document.getElementById('aw-save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';

  try {
    let saved = 0;
    for (let i = 0; i < AW_SLOTS; i++) {
      // Attack row
      const atkRow = document.getElementById(`aw-atk-${i}`);
      if (atkRow) {
        const inputs = atkRow.querySelectorAll('input');
        const player = inputs[0].value.trim();
        const aWins  = parseFloat(inputs[1].value) || 0;
        const aLoss  = parseFloat(inputs[2].value) || 0;
        if (player && (aWins + aLoss) > 0) {
          await addDoc(collection(window.fsDb,'playerstats'), {
            player, war: warName, aWins, aLoss, dWins:0, dLoss:0, added: Date.now()
          });
          saved++;
        }
      }
      // Defense row
      const defRow = document.getElementById(`aw-def-${i}`);
      if (defRow) {
        const inputs = defRow.querySelectorAll('input');
        const player = inputs[0].value.trim();
        const dWins  = parseFloat(inputs[1].value) || 0;
        const dLoss  = parseFloat(inputs[2].value) || 0;
        if (player && (dWins + dLoss) > 0) {
          await addDoc(collection(window.fsDb,'playerstats'), {
            player, war: warName, aWins:0, aLoss:0, dWins, dLoss, added: Date.now()
          });
          saved++;
        }
      }
    }
    clearWarDraft();
    closeAddWarModal();
    window.toast(`War "${warName}" saved — ${saved} entries added.`, 'ok');
  } catch(e) {
    window.toast('Save failed: ' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Save War';
  }
};



// ══════════════════════════════════════════════════════
// ROSTER TAB — active players from most recent war
// ══════════════════════════════════════════════════════

let rosterMode    = 'both';
let rosterColSort = { col: 'aWR', dir: 'desc' };

window.setRosterMode = mode => {
  rosterMode = mode;
  document.querySelectorAll('.toggle-btn[id^="roster-mode-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('roster-mode-' + mode).classList.add('active');
  renderRoster();
};

window.sortRosterCol = col => {
  if (rosterColSort.col === col) {
    rosterColSort.dir = rosterColSort.dir === 'desc' ? 'asc' : 'desc';
  } else {
    rosterColSort = { col, dir: 'desc' };
  }
  renderRoster();
};

window.renderRoster = () => {
  const summaryEl = document.getElementById('roster-summary');
  const theadEl   = document.getElementById('roster-thead');
  const tbodyEl   = document.getElementById('roster-tbody');
  const subEl     = document.getElementById('roster-sub');
  if (!summaryEl || !theadEl || !tbodyEl) return;

  // Get all wars from S3 and beyond (any season number >= 3)
  const allWars = [...new Set(statsEntries.map(e => (e.war||'').trim()).filter(Boolean))];
  if (!allWars.length) {
    tbodyEl.innerHTML = '<tr><td colspan="10" style="text-align:center;color:var(--text-3);padding:2rem">No data yet — import your Excel sheet on the Player Stats tab.</td></tr>';
    return;
  }
  const recentWar = sortWars(allWars)[0];
  if (subEl) subEl.textContent = `Active roster — players from ${recentWar}`;

  // Only players who appeared in the most recent war
  const rosterNames = new Set(
    statsEntries
      .filter(e => (e.war||'').trim() === recentWar)
      .map(e => mergePlayer((e.player||'').trim()))
      .filter(Boolean)
  );

  // Aggregate stats for those players across ALL wars
  const map = {};
  statsEntries.forEach(e => {
    const name = mergePlayer((e.player||'').trim());
    if (!name || !rosterNames.has(name)) return;
    const k = name.toLowerCase();
    if (!map[k]) map[k] = { name, aWins:0, aLoss:0, dWins:0, dLoss:0 };
    map[k].aWins += (e.aWins||0);
    map[k].aLoss += (e.aLoss||0);
    map[k].dWins += (e.dWins||0);
    map[k].dLoss += (e.dLoss||0);
  });

  let players = Object.values(map).map(p => {
    const aHits = p.aWins + p.aLoss;
    const dHits = p.dWins + p.dLoss;
    return {
      ...p, aHits, dHits,
      totHits: aHits + dHits,
      totWins: p.aWins + p.dWins,
      aWR:   aHits > 0 ? p.aWins / aHits : null,
      dWR:   dHits > 0 ? p.dWins / dHits : null,
      totWR: (aHits + dHits) > 0 ? (p.aWins + p.dWins) / (aHits + dHits) : null,
    };
  });

  // Sort
  const { col, dir } = rosterColSort;
  const mult = dir === 'desc' ? 1 : -1;
  players.sort((a, b) => {
    if (col === 'name') return (dir === 'asc' ? 1 : -1) * a.name.localeCompare(b.name);
    const av = a[col], bv = b[col];
    if (av === null && bv === null) return 0;
    if (av === null) return 1;
    if (bv === null) return -1;
    return mult * (bv - av);
  });

  // Summary cards
  const withAWR = players.filter(p => p.aWR !== null);
  const withDWR = players.filter(p => p.dWR !== null);
  const aAvg = withAWR.length ? withAWR.reduce((s,p) => s+p.aWR, 0) / withAWR.length : null;
  const dAvg = withDWR.length ? withDWR.reduce((s,p) => s+p.dWR, 0) / withDWR.length : null;
  const totAvg = players.filter(p=>p.totWR!==null);
  const oAvg = totAvg.length ? totAvg.reduce((s,p)=>s+p.totWR,0)/totAvg.length : null;
  summaryEl.innerHTML = `
    <div class="stat-card"><div class="stat-card-label">Roster Size</div><div class="stat-card-val">${players.length}</div><div class="stat-card-sub">active players</div></div>
    <div class="stat-card"><div class="stat-card-label">Avg Off WR</div><div class="stat-card-val" style="color:${wrColor(aAvg)}">${fmtWR(aAvg)}</div><div class="stat-card-sub">roster average</div></div>
    <div class="stat-card"><div class="stat-card-label">Avg Def WR</div><div class="stat-card-val" style="color:${wrColor(dAvg)}">${fmtWR(dAvg)}</div><div class="stat-card-sub">roster average</div></div>
    <div class="stat-card"><div class="stat-card-label">Avg Overall WR</div><div class="stat-card-val" style="color:${wrColor(oAvg)}">${fmtWR(oAvg)}</div><div class="stat-card-sub">roster average</div></div>`;

  // Header
  const showA = rosterMode === 'both' || rosterMode === 'attack';
  const showD = rosterMode === 'both' || rosterMode === 'defense';
  function rth(label, col) {
    const active = rosterColSort.col === col;
    const arrow  = active ? (rosterColSort.dir === 'desc' ? ' ↓' : ' ↑') : '';
    return `<th onclick="sortRosterCol('${col}')" style="cursor:pointer;user-select:none${active?';color:var(--purple-pale)':''}">${label}${arrow}</th>`;
  }
  theadEl.innerHTML = `<tr>
    ${rth('Player','name')}
    ${showA ? `${rth('Off W','aWins')}${rth('Off L','aLoss')}${rth('Off Hits','aHits')}${rth('Off WR','aWR')}` : ''}
    ${showD ? `${rth('Def W','dWins')}${rth('Def L','dLoss')}${rth('Def Hits','dHits')}${rth('Def WR','dWR')}` : ''}
    ${rosterMode==='both' ? `${rth('Total','totHits')}${rth('Overall WR','totWR')}` : ''}
  </tr>`;

  // Rows — rank badge on first 3
  const medals = ['🥇','🥈','🥉'];
  tbodyEl.innerHTML = players.length ? players.map((p, idx) => {
    const rank = idx < 3 ? `<span style="margin-right:4px">${medals[idx]}</span>` : `<span style="color:var(--text-3);font-size:12px;margin-right:4px">${idx+1}</span>`;
    return `<tr>
      <td style="font-weight:500">${rank}${esc(p.name)}</td>
      ${showA ? `<td>${p.aWins}</td><td>${p.aLoss}</td><td>${p.aHits}</td><td>${wrBar(p.aWR)}</td>` : ''}
      ${showD ? `<td>${p.dWins}</td><td>${p.dLoss}</td><td>${p.dHits}</td><td>${wrBar(p.dWR)}</td>` : ''}
      ${rosterMode==='both' ? `<td>${p.totHits}</td><td>${wrBar(p.totWR)}</td>` : ''}
    </tr>`;
  }).join('') : '<tr><td colspan="12" style="text-align:center;color:var(--text-3);padding:2rem">No roster data found.</td></tr>';
};

// Re-render roster when stats data updates
const _origInitStats = window.initStatsListener;
window.initStatsListener = function(db, fns) {
  _origInitStats && _origInitStats(db, fns);
};
